name: fittrack
description: Home workout app with personalized programs and progress tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  provider: ^6.1.2
  go_router: ^13.2.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.1.2
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
